<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIA - Ultimate Protocol MVP (FEC Network Edition)</title>
    <style>
        :root {
            --primary: #00ffcc; --sender-color: #3b82f6; --receiver-color: #a855f7;
            --fec-color: #f59e0b; --bg-color: #0b0f19; --panel-bg: #111827;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --text-color: #e0e0e0;
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; width: 100%; max-width: 1300px; margin-top: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .dashboard { display: flex; flex-direction: column; width: 100%; max-width: 1300px; gap: 15px; }

        /* Control Panel */
        .control-panel { background-color: var(--panel-bg); border: 1px solid #374151; border-radius: 8px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; flex-grow: 1; min-width: 130px; }
        .input-group.concept { min-width: 180px; }
        label { margin-bottom: 5px; font-weight: bold; color: #9ca3af; font-size: 12px;}
        input[type="text"] { background: #1f2937; border: 1px solid var(--primary); color: white; padding: 10px; border-radius: 4px; font-family: inherit; font-size: 14px; }
        input[type="range"] { cursor: pointer; width: 100%; }

        .btn-group { display: flex; gap: 8px; height: 42px; }
        button { background-color: transparent; color: var(--primary); border: 2px solid var(--primary); padding: 0 15px; cursor: pointer; font-weight: bold; font-family: inherit; transition: all 0.3s ease; text-transform: uppercase; border-radius: 4px; font-size: 13px; }
        button:hover:not(:disabled) { background-color: var(--primary); color: var(--bg-color); box-shadow: 0 0 10px var(--primary); }
        #monteCarloBtn { color: var(--warning); border-color: var(--warning); }
        #monteCarloBtn:hover:not(:disabled) { background-color: var(--warning); color: var(--bg-color); box-shadow: 0 0 10px var(--warning); }
        button:disabled { border-color: #555 !important; color: #555 !important; cursor: not-allowed; box-shadow: none !important;}

        /* Network Layout */
        .network-grid { display: grid; grid-template-columns: 1fr 220px 1fr; gap: 15px; height: 500px; }
        .node-panel { background-color: var(--panel-bg); border: 1px solid #374151; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden;}
        .node-header { padding: 10px 15px; font-weight: bold; border-bottom: 1px solid #374151; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .sender-header { color: var(--sender-color); border-top: 3px solid var(--sender-color); }
        .receiver-header { color: var(--receiver-color); border-top: 3px solid var(--receiver-color); }

        .terminal { background-color: #000; flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 12px; line-height: 1.5; }
        .log-line { opacity: 0; animation: fadeIn 0.2s forwards; margin-bottom: 4px; }
        .log-info { color: #88B04B; } .log-warn { color: var(--warning); font-weight: bold;} .log-error { color: var(--danger); font-weight: bold;} .log-success { color: var(--success); font-weight: bold; } .log-fec { color: var(--fec-color); font-weight: bold; } .log-dim { color: #6B7280; }

        .visualizer { background-color: #000; border: 1px dotted #555; border-radius: 8px; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .void-text { color: rgba(239, 68, 68, 0.4); font-weight: bold; letter-spacing: 2px; text-align: center; z-index: 0; position: absolute; }
        
        .pod { position: absolute; width: 10px; height: 10px; border-radius: 50%; top: 50%; left: 0; opacity: 0; z-index: 10; }
        .pod-normal { background-color: var(--sender-color); box-shadow: 0 0 6px var(--sender-color); }
        .pod-fec { background-color: var(--fec-color); box-shadow: 0 0 8px var(--fec-color); }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes flyAcross { 0% { left: 0%; opacity: 1; } 100% { left: 95%; opacity: 1; background-color: var(--receiver-color); box-shadow: 0 0 8px var(--receiver-color);} }
        @keyframes destroyPod { 0% { left: 0%; opacity: 1; } 45% { left: 45%; opacity: 1; background-color: var(--danger); box-shadow: 0 0 15px var(--danger); transform: scale(1.5); } 50% { opacity: 0; } 100% { left: 50%; opacity: 0; } }
    </style>
</head>
<body>

    <h1>🌐 TIA Protocol MVP - FEC Network Edition</h1>

    <div class="dashboard">
        <div class="control-panel">
            <div class="input-group concept">
                <label>Concept (คำศัพท์):</label>
                <input type="text" id="conceptInput" placeholder="ทดสอบ: น้ำ, อาวุธ">
            </div>
            <div class="input-group">
                <label>1. Loss Rate: <span id="lossVal" style="color:var(--danger)">80</span>%</label>
                <input type="range" id="lossRate" min="10" max="95" value="80" oninput="document.getElementById('lossVal').innerText = this.value">
            </div>
            <div class="input-group">
                <label>2. Base Burst Size: <span id="burstVal" style="color:var(--primary)">50</span></label>
                <input type="range" id="burstSize" min="10" max="100" value="50" step="10" oninput="document.getElementById('burstVal').innerText = this.value">
            </div>
            <div class="input-group">
                <label>3. AI Thresh: <span id="threshVal" style="color:var(--success)">20</span>%</label>
                <input type="range" id="aiThreshold" min="5" max="50" value="20" step="5" oninput="document.getElementById('threshVal').innerText = this.value">
            </div>
            <div class="input-group">
                <label>4. FEC Redundancy: <span id="fecVal" style="color:var(--fec-color)">20</span>%</label>
                <input type="range" id="fecRate" min="0" max="100" value="20" step="10" oninput="document.getElementById('fecVal').innerText = this.value">
            </div>
            <div class="btn-group">
                <button id="startBtn" onclick="runLiveSimulation()">Live</button>
                <button id="monteCarloBtn" onclick="runMonteCarlo()">Monte Carlo</button>
            </div>
        </div>

        <div class="network-grid">
            <div class="node-panel">
                <div class="node-header sender-header">👤 SENDER NODE (Layer C, B, A)</div>
                <div class="terminal" id="termSender"><div class="log-line log-dim">System Ready. Adjust network parameters...</div></div>
            </div>

            <div class="visualizer" id="visualizer">
                <div class="void-text">THE VOID<br>(Packet Loss)</div>
            </div>

            <div class="node-panel">
                <div class="node-header receiver-header">🔭 RECEIVER NODE (AI Validation)</div>
                <div class="terminal" id="termReceiver"><div class="log-line log-dim">Listening on UDP/UKB Protocol...</div></div>
            </div>
        </div>
    </div>

    <script>
        const termSender = document.getElementById('termSender');
        const termReceiver = document.getElementById('termReceiver');
        const visualizer = document.getElementById('visualizer');
        const startBtn = document.getElementById('startBtn');
        const mcBtn = document.getElementById('monteCarloBtn');
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function logSender(msg, type = 'info') { termSender.innerHTML += `<div class="log-line log-${type}">> ${msg}</div>`; termSender.scrollTop = termSender.scrollHeight; }
        function logReceiver(msg, type = 'info') { termReceiver.innerHTML += `<div class="log-line log-${type}">> ${msg}</div>`; termReceiver.scrollTop = termReceiver.scrollHeight; }

        function createPodAnim(type, status, delayIndex) {
            const pod = document.createElement('div');
            pod.className = 'pod';
            pod.style.marginTop = `${(Math.random() - 0.5) * 200}px`; 
            
            if (status === 'destroyed') {
                pod.classList.add(type === 'fec' ? 'pod-fec' : 'pod-normal');
                pod.style.animation = `destroyPod 1.5s forwards ${delayIndex * 0.05}s`;
            } else {
                pod.classList.add(type === 'fec' ? 'pod-fec' : 'pod-normal');
                pod.style.animation = `flyAcross 2s forwards ${delayIndex * 0.05}s`;
            }
            
            visualizer.appendChild(pod);
            setTimeout(() => pod.remove(), 2500);
        }

        const restrictedKeywords = ["อาวุธ", "ระเบิด", "นิวเคลียร์", "ปืน", "ทำลายล้าง", "weapon", "nuclear"];

        async function runLiveSimulation() {
            startBtn.disabled = true; mcBtn.disabled = true;
            termSender.innerHTML = ''; termReceiver.innerHTML = '';
            
            let rawInput = document.getElementById('conceptInput').value.trim() || "คลื่นความถี่ว่าง";
            const lossRate = parseInt(document.getElementById('lossRate').value) / 100;
            const burstSize = parseInt(document.getElementById('burstSize').value);
            const aiThreshold = parseInt(document.getElementById('aiThreshold').value) / 100;
            const fecRate = parseInt(document.getElementById('fecRate').value) / 100;

            const fecPods = Math.floor(burstSize * fecRate);
            const totalSent = burstSize + fecPods;
            const requiredPods = Math.ceil(burstSize * aiThreshold); // AI ต้องการจำนวนเท่านี้จาก Base Burst

            logSender(`[INIT] Concept: '${rawInput}'`, "info");
            logSender(`[PARAM] Base Burst: ${burstSize} | AI Need: ${requiredPods} Pods (${(aiThreshold*100).toFixed(0)}%)`, "dim");
            await sleep(500);

            if (restrictedKeywords.some(keyword => rawInput.toLowerCase().includes(keyword))) {
                logSender(`🛑 [ETHICS] WMD Restriction Triggered! ABORTED.`, "error");
                startBtn.disabled = false; mcBtn.disabled = false; return;
            }

            logSender(`[NETWORK] Generating ${fecPods} FEC Redundancy Pods (+${(fecRate*100).toFixed(0)}%)...`, "fec");
            logSender(`[LAYER A] Firing Total ${totalSent} Pods into The Void!`, "info");

            let survivedCount = 0;
            logReceiver("[⏳] Awaiting packets...", "warn");
            logReceiver(`[AI RULE] Requires >= ${requiredPods} Pods to reconstruct.`, "dim");

            for (let i = 0; i < totalSent; i++) {
                let isFec = i >= burstSize;
                let isDestroyed = Math.random() < lossRate;
                
                createPodAnim(isFec ? 'fec' : 'normal', isDestroyed ? 'destroyed' : 'survived', i);
                
                if (!isDestroyed) survivedCount++;
                if (isFec && !isDestroyed) logSender(`🛡️ FEC Pod ${i+1} survived!`, "fec");
            }
            
            await sleep(2000 + (totalSent * 30));

            logReceiver(`=================================`, "dim");
            if (survivedCount === 0) {
                logReceiver(`[CRITICAL] 0 Pods received. CONNECTION LOST.`, "error");
            } else {
                logReceiver(`📊 Received: ${survivedCount} Pods (Target: ${requiredPods})`, "info");
                await sleep(500);

                if (survivedCount >= requiredPods) {
                    logReceiver(`[VALIDATION] Sufficient Data Received! AI Recovery Successful.`, "success");
                    logReceiver(`🎯 PREDICTION: ${rawInput}`, "success");
                } else {
                    logReceiver(`[VALIDATION] Insufficient Data (${survivedCount}/${requiredPods}). Recovery FAILED.`, "error");
                    let corruptedOutput = rawInput.substring(0, Math.max(1, Math.floor(rawInput.length/3))) + "...[CORRUPT]";
                    logReceiver(`🎯 BEST GUESS: ${corruptedOutput}`, "warn");
                }
            }
            logReceiver(`=================================`, "dim");
            startBtn.disabled = false; mcBtn.disabled = false;
        }

        async function runMonteCarlo() {
            startBtn.disabled = true; mcBtn.disabled = true;
            termSender.innerHTML = ''; termReceiver.innerHTML = '';
            
            const lossRate = parseInt(document.getElementById('lossRate').value) / 100;
            const burstSize = parseInt(document.getElementById('burstSize').value);
            const aiThreshold = parseInt(document.getElementById('aiThreshold').value) / 100;
            const fecRate = parseInt(document.getElementById('fecRate').value) / 100;
            const iterations = 1000;

            const fecPods = Math.floor(burstSize * fecRate);
            const totalSent = burstSize + fecPods;
            const requiredPods = Math.ceil(burstSize * aiThreshold);

            logSender(`[SYSTEM] Monte Carlo Benchmark (1,000x)`, "warn");
            logSender(`[CONFIG] Base: ${burstSize} | FEC: +${fecPods} Pods | Required: ${requiredPods}`, "dim");
            logSender(`[LAYER A] The Void Loss Rate: ${(lossRate*100).toFixed(0)}%`, "error");
            
            logReceiver(`[SYSTEM] Ready for Batch Processing.`, "warn");
            await sleep(800);

            logSender(`[LAYER A] Executing 1,000 Burst Transmissions...`, "info");
            for(let i=0; i<40; i++) { 
                let isFec = Math.random() < fecRate;
                createPodAnim(isFec ? 'fec' : 'normal', Math.random() < lossRate ? 'destroyed' : 'survived', i * 0.02); 
            }
            await sleep(1500);

            let successCount = 0;
            for (let i = 0; i < iterations; i++) {
                let survived = 0;
                for (let p = 0; p < totalSent; p++) {
                    if (Math.random() >= lossRate) survived++;
                }
                if (survived >= requiredPods) successCount++;
            }

            let graAccuracy = (successCount / iterations) * 100;
            logSender(`[SYSTEM] 1,000 Transmissions Completed.`, "success");
            
            logReceiver(`📊 MONTE CARLO RESULTS`, "warn");
            logReceiver(`- The Void Loss: ${(lossRate*100).toFixed(0)}%`, "error");
            logReceiver(`- FEC Redundancy Applied: ${(fecRate*100).toFixed(0)}%`, "fec");
            logReceiver(`- Generative Recovery Accuracy (GRA): ${graAccuracy.toFixed(1)}%`, "success");
            
            if (graAccuracy > 80) {
                logReceiver(`✅ [PASS] Protocol Maturity Confirmed!`, "success");
            } else {
                logReceiver(`❌ [FAIL] Accuracy too low. Increase FEC or Burst Size!`, "error");
            }
            startBtn.disabled = false; mcBtn.disabled = false;
        }
    </script>
</body>
</html>
